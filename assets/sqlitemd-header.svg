<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SqliteMd banner</title>
  <desc id="desc">A friendly banner for SqliteMd showing Markdown tables flowing into SQLite queries.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="36" x2="1114" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="0.48" stop-color="#EFFCF7"/>
      <stop offset="1" stop-color="#E6F0FF"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#94A3B8" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="32" fill="url(#grid)"/>

  <circle cx="1032" cy="76" r="94" fill="#10B981" fill-opacity="0.09"/>
  <circle cx="1090" cy="152" r="52" fill="#0EA5E9" fill-opacity="0.08"/>
  <circle cx="880" cy="334" r="72" fill="#F97316" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="694" y="72" width="408" height="258" rx="28" fill="url(#cardA)"/>
    <rect x="724" y="102" width="348" height="198" rx="18" fill="#0B1220"/>
    <rect x="748" y="126" width="144" height="30" rx="15" fill="#1D4ED8" fill-opacity="0.22"/>
    <text x="768" y="146" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#BFDBFE">markdown_glob(...)</text>
    <text x="748" y="186" font-family="Consolas, 'Courier New', monospace" font-size="17" fill="#E2E8F0">SELECT title, _path</text>
    <text x="748" y="214" font-family="Consolas, 'Courier New', monospace" font-size="17" fill="#E2E8F0">FROM tasks</text>
    <text x="748" y="242" font-family="Consolas, 'Courier New', monospace" font-size="17" fill="#E2E8F0">WHERE stars &gt;= 10</text>
    <text x="748" y="270" font-family="Consolas, 'Courier New', monospace" font-size="17" fill="#E2E8F0">ORDER BY _path, id;</text>
    <rect x="748" y="284" width="92" height="8" rx="4" fill="#10B981"/>
    <rect x="748" y="300" width="136" height="8" rx="4" fill="#60A5FA"/>
    <rect x="748" y="316" width="174" height="8" rx="4" fill="#F59E0B"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="492" y="138" width="180" height="134" rx="22" fill="url(#cardB)"/>
    <rect x="518" y="164" width="128" height="22" rx="11" fill="#10B981" fill-opacity="0.18"/>
    <text x="534" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#047857">Markdown table</text>
    <text x="518" y="212" font-family="Consolas, 'Courier New', monospace" font-size="12.5" fill="#334155">| id | title |</text>
    <text x="518" y="232" font-family="Consolas, 'Courier New', monospace" font-size="12.5" fill="#334155">| --- | --- |</text>
    <text x="518" y="252" font-family="Consolas, 'Courier New', monospace" font-size="12.5" fill="#334155">| 1 | Alpha |</text>
  </g>

  <path d="M648 206C667 206 679 206 694 206" stroke="#0F766E" stroke-width="6" stroke-linecap="round"/>
  <path d="M687 194L704 206L687 218" stroke="#0F766E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="72" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="800" fill="#0F172A">SqliteMd</text>
  <text x="72" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" fill="#0F766E">Query, scan, and diagnose Markdown tables with SQLite.</text>
  <text x="72" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#334155">Turn ordinary <tspan font-weight="700">.md</tspan> files into something you can read, write,</text>
  <text x="72" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#334155">search across repositories, and debug with one SQL surface.</text>

  <rect x="72" y="286" width="150" height="38" rx="19" fill="#F97316" fill-opacity="0.14"/>
  <text x="92" y="311" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#C2410C">Writable files</text>

  <rect x="236" y="286" width="172" height="38" rx="19" fill="#10B981" fill-opacity="0.14"/>
  <text x="256" y="311" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#047857">Repository scans</text>

  <rect x="422" y="286" width="172" height="38" rx="19" fill="#1D4ED8" fill-opacity="0.14"/>
  <text x="442" y="311" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1D4ED8">Unified diagnostics</text>
</svg>
