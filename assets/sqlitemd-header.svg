<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SqliteMd banner</title>
  <desc id="desc">A banner for SqliteMd focused on the basic case of attaching one Markdown table from one file to SQLite.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="26" x2="1128" y2="394" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="0.46" stop-color="#F1FBF6"/>
      <stop offset="1" stop-color="#E8F0FF"/>
    </linearGradient>
    <linearGradient id="code" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#94A3B8" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="32" fill="url(#grid)"/>

  <circle cx="1038" cy="72" r="88" fill="#10B981" fill-opacity="0.08"/>
  <circle cx="1096" cy="148" r="48" fill="#38BDF8" fill-opacity="0.08"/>
  <circle cx="874" cy="334" r="68" fill="#F97316" fill-opacity="0.08"/>

  <text x="72" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="800" fill="#0F172A">SqliteMd</text>
  <text x="72" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" fill="#0F766E">Turn one Markdown table</text>
  <text x="72" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" fill="#0F766E">into one SQLite table.</text>
  <text x="72" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">Start with the simplest case: attach a single <tspan font-weight="700">notes.md</tspan> file,</text>
  <text x="72" y="258" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">query it with SQL, then grow into mode-aware writes</text>
  <text x="72" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">and diagnostics when you need them.</text>

  <g filter="url(#shadow)">
    <rect x="96" y="300" width="300" height="104" rx="22" fill="url(#paper)"/>
    <rect x="120" y="320" width="88" height="24" rx="12" fill="#F97316" fill-opacity="0.16"/>
    <text x="138" y="337" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#C2410C">notes.md</text>
    <text x="120" y="362" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#0F172A">## Notes</text>
    <text x="120" y="382" font-family="Consolas, 'Courier New', monospace" font-size="13.5" fill="#334155">| id | title | stars |</text>
    <text x="120" y="400" font-family="Consolas, 'Courier New', monospace" font-size="13.5" fill="#334155">| 1  | Alpha | 10    |</text>
  </g>

  <path d="M420 352C500 352 548 352 622 352" stroke="#0F766E" stroke-width="6" stroke-linecap="round"/>
  <path d="M605 340L624 352L605 364" stroke="#0F766E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="652" y="70" width="470" height="274" rx="30" fill="url(#code)"/>
    <rect x="684" y="102" width="198" height="30" rx="15" fill="#2563EB" fill-opacity="0.24"/>
    <text x="704" y="122" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#BFDBFE">markdown_table(...)</text>

    <text x="684" y="162" font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#E2E8F0">CREATE VIRTUAL TABLE notes</text>
    <text x="684" y="188" font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#E2E8F0">USING markdown_table('notes.md',</text>
    <text x="684" y="214" font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#E2E8F0">  'Notes', 'id INTEGER, title TEXT, stars INTEGER', 'id');</text>

    <text x="684" y="258" font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#E2E8F0">SELECT id, title, stars</text>
    <text x="684" y="284" font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#E2E8F0">FROM notes</text>
    <text x="684" y="310" font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#E2E8F0">ORDER BY id;</text>

    <rect x="684" y="322" width="108" height="8" rx="4" fill="#10B981"/>
    <rect x="684" y="336" width="158" height="8" rx="4" fill="#60A5FA"/>
  </g>
</svg>
