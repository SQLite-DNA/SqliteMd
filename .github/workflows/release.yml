name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: Publish release artifacts
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SQLite-DNA/SqliteDna
          ref: feature/writable-virtual-tables-xupdate
          path: SQLite-DNA/SqliteDna
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x
      - name: Compute version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart('v')
          } else {
            $version = "0.0.0-dev"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Restore
        run: dotnet restore SqliteMd.slnx
      - name: Build extension binary
        run: dotnet build SqliteMd/SqliteMd.csproj -c Release --no-restore
      - name: Stage extension artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/windows-x64 -Force | Out-Null
          Copy-Item SqliteMd/bin/Release/net7.0/win-x64/publish/* artifacts/windows-x64 -Recurse -Force
      - name: Publish CLI binary
        run: dotnet publish SqliteMd.Cli/SqliteMd.Cli.csproj --configuration Release --framework net7.0 --runtime win-x64 --self-contained false --output artifacts/sqlitemd-win-x64
      - name: Pack CLI tool
        run: dotnet pack SqliteMd.Cli/SqliteMd.Cli.csproj --configuration Release --no-restore --output artifacts/packages /p:Version=${{ steps.version.outputs.version }} /p:PackageVersion=${{ steps.version.outputs.version }}
      - name: Create release archive
        shell: pwsh
        run: |
          if (Test-Path artifacts/sqlitemd-win-x64/SqliteMd.Cli.exe) { Remove-Item artifacts/sqlitemd-win-x64/SqliteMd.Cli.exe -Force }
          Compress-Archive -Path artifacts/windows-x64/* -DestinationPath artifacts/windows-x64/SqliteMd-windows-x64.zip -Force
          Compress-Archive -Path artifacts/sqlitemd-win-x64/* -DestinationPath artifacts/sqlitemd-win-x64/sqlitemd-win-x64.zip -Force
          New-Item -ItemType Directory -Path artifacts/skills -Force | Out-Null
          Compress-Archive -Path skills/sqlitemd-agent -DestinationPath artifacts/skills/sqlitemd-agent-skill.zip -Force
      - name: Run tests
        shell: pwsh
        run: |
          dotnet test SqliteMd.Tests/SqliteMd.Tests.csproj --configuration Debug --no-restore
          dotnet test SqliteMd.Cli.Tests/SqliteMd.Cli.Tests.csproj --configuration Debug --no-restore
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlitemd-release-assets
          path: |
            artifacts/windows-x64/SqliteMd.dll
            artifacts/windows-x64/SqliteMd.pdb
            artifacts/windows-x64/SqliteMd-windows-x64.zip
            artifacts/sqlitemd-win-x64/sqlitemd.exe
            artifacts/sqlitemd-win-x64/sqlitemd-win-x64.zip
            artifacts/packages/*.nupkg
            artifacts/skills/sqlitemd-agent-skill.zip
          if-no-files-found: error
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/windows-x64/SqliteMd.dll
            artifacts/windows-x64/SqliteMd.pdb
            artifacts/windows-x64/SqliteMd-windows-x64.zip
            artifacts/sqlitemd-win-x64/sqlitemd.exe
            artifacts/sqlitemd-win-x64/sqlitemd-win-x64.zip
            artifacts/packages/*.nupkg
            artifacts/skills/sqlitemd-agent-skill.zip
