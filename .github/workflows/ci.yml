name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build and test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: SQLite-DNA/SqliteDna
          ref: feature/writable-virtual-tables-xupdate
          path: SQLite-DNA/SqliteDna
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x
      - name: Restore
        run: dotnet restore SqliteMd.slnx
      - name: Build extension binary
        run: dotnet build SqliteMd/SqliteMd.csproj -c Release --no-restore
      - name: Stage extension artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/windows-x64 -Force | Out-Null
          Copy-Item SqliteMd/bin/Release/net7.0/win-x64/publish/* artifacts/windows-x64 -Recurse -Force
      - name: Publish CLI binary
        run: dotnet publish SqliteMd.Cli/SqliteMd.Cli.csproj --configuration Release --framework net7.0 --runtime win-x64 --self-contained false --output artifacts/sqlitemd-win-x64
      - name: Test extension
        run: dotnet test SqliteMd.Tests/SqliteMd.Tests.csproj -c Debug --no-restore
      - name: Test CLI
        run: dotnet test SqliteMd.Cli.Tests/SqliteMd.Cli.Tests.csproj -c Debug --no-restore
